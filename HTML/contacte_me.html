<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Styles.css">
    <link rel="stylesheet" href="../CSS/contacte.css">
    <title>António Quimuanga | Contacte me</title>
</head>
<body>
    <!-- Cabeçalho do site com o logo, menu, e botão do menu mobile -->
    <header>
        <!-- Logo do site -->
        <div class="logo">
            <a href="../index.html">ASQ</a>
        </div>
        <!-- Menu localizado no cabeçalho do site -->
        <nav class="menu">
            <ul class="links">
                <li class="link"><a href="../index.html">Home</a></li>
                <li class="link"><a href="whoAmI.html">Who'm I</a></li>
                <li class="link"><a href="../HTML/services.html">My services</a></li>
                <li class="link"><a href="../HTML/contacte_me.html">Contact me</a></li>
            </ul>
        </nav>
        <!-- Botão para abrir o menu mobile -->
        <div id="open">
            <svg id="open-menu" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" focusable="false" aria-hidden="true" style="display: inherit;">
                <path d="M20 5H4a1 1 0 000 2h16a1 1 0 100-2Zm0 6H4a1 1 0 000 2h16a1 1 0 000-2Zm0 6H4a1 1 0 000 2h16a1 1 0 000-2Z">
                </path>
            </svg>
        </div>
    </header>
    <!-- Menu Mobile -->
    <nav class="menu-mobile" id="menu-mobile">
            <ul class="mobile-links">
                <li class="link_mobile"><a href="../index.html">Home</a></li>
                <li class="link_mobile"><a href="whoAmI.html">Who'm I</a></li>
                <li class="link_mobile"><a href="../HTML/services.html">My services</a></li>
                <li class="link_mobile"><a href="../HTML/contacte_me.html">Contact me</a></li>
            </ul>
    </nav>
    <!-- Camada que cobre o site quando o menu mobile é aberto -->
    <div class="overlay_menu" id="overlay_menu"></div>
    <!-- Animação de transição entre abbas do site-->
    <div class="transition">
        <div class="transition-row row1">
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
        </div>
        <div class="transition-row row2">
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
            <div class="block_item"></div>
        </div>
    </div>
    <main>
        <div class="wrapper">
            <svg id="svg" viewBox="0 0 1000 1000">
                <g id="left-eye">
                    <circle class="eye-outer" cx="400" cy="500" r="100" stroke-width="3" stroke="#0f0f0f" fill="#ffffff"></circle>
                    <circle class="eye-inner" id="eye-inner_right" cx="480" cy="500" r="20" stroke-width="1" stroke="#0f0f0f" fill="#000000"></circle>
                </g>
                <g id="right-eye">
                    <circle class="eye-outer" cx="630" cy="500" r="100" stroke-width="3" stroke="#0f0f0f" fill="#ffffff"></circle>
                    <circle class="eye-inner" id="eye-inner_left" cx="710" cy="500" r="20" stroke-width="1" stroke="#0f0f0f" fill="#000000"></circle>
                </g>
            </svg>
            <div class="container">
                    <a href="" class="text">Instagram</a>
                <div id="twolinks">
                    <a href="" class="text">Github</a>
                    <a href="" class="text">Facebook</a>
                </div>
                    <a href="" class="text">LinkedIn</a>
            </div>
        </div>
    </main>
    <!-- <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/CustomEase.min.js"></script> -->
    <script src="../JS/index.js"></script>
    <script src="../JS/contacte_me.js"></script>
    <script src="../JS/transition.js"></script>
    <script src="../JS/gsap.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger, CustomEase);
    </script>
    <script>
        gsap.from(".link",{
            y: "-200px",
            duration: 1.1,
            ease: "power1.inOut",
            opacity: 0,
            stagger:{
                amount: .25,
            },
        });
    </script>
</body>
</html>
